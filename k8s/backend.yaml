apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: rahulpatrajee1/connectrabackend:a6878c7b42cd46bd5c9f7399503e37313aafc15c
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: backend-secret


---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 5000
  type: LoadBalancer