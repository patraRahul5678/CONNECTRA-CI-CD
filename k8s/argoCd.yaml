apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectra-argocd
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/patraRahul5678/CONNECTRA-CI-CD.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
