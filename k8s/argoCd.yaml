apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: connectra-argocd
spec:
  project: default
  source:
    repoURL: https://github.com/patraRahul5678/CONNECTRA-CI-CD.git/k8s
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
